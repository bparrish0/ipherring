<!DOCTYPE html>
<html>
<head><meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no" />
<title>IP Herring</title>
<style type="text/css">
	html,body{
		border:none; padding:0; margin:0;
		background:#FFFFFF;
		color:#202020;
	}
	body{
		text-align:center;
		font-family:"Roboto",sans-serif;
	}
	h1{
		color:#404040;
	}
	img{
        width: 25%;
    }
</style>
</head>
<body>
<img src="" id="herring" alt="IP Herring">
<center>
        <h2 id="ip">Loading...</h2>
</center>
<script>
const images = [
  '/andy-random/99d84276-1907-4f2c-b8f9-d0d3cbdec80d.png',
  '/andy-random/2124b1d8-1a0a-4c67-9257-45b745f759b2.png',
  '/andy-random/bc79b2f9-3395-4ba2-b7d5-e6ba547a71b9.png',
  '/andy-random/c676298f-b92c-4fd2-82e8-0780f91976ea.png',
];
document.getElementById('herring').src = images[Math.floor(Math.random() * images.length)];
fetch('/cdn-cgi/trace').then(r => r.text()).then(t => {
  const ip = t.match(/ip=(.+)/);
  if (ip) document.getElementById('ip').textContent = ip[1];
});
</script>
</body>
</html>
